<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Gemini</title>
</head>
<body style="font-family:sans-serif" align="center"><h1>Gemini</h1>
    <img src="https://play-lh.googleusercontent.com/bTpNtZ6rYYX2SeI-wC4cnr7MJnOh2hjtgYu3UIrSxE09lM3GPl_Uhf9_Ih2Smje2bc0V=w600-h300-pc0xffffff-pd">
    <label for="items">Choose an option:</label>
    <select name="items" id="items" value="3">
        <option value="1"></option>
        <option value="2">Option 2</option>
        <option value="3">Option 3</option>
    </select>
    <label for="fruits">Select multiple fruits:</label>
    <select name="fruits" id="fruits" multiple size="1">
        <option value="apple">Apple</option>
        <option value="banana">Banana</option>
        <option value="cherry">Cherry</option>
        <option value="date">Date</option>
    </select>
    <input type="checkbox" id="subscribe" name="subscribe" value="newsletter">
    <label for="subscribe"> Subscribe to newsletter</label>
    <canvas id="gameBoard" width="480" height="270" style="border:1px solid #000;"></canvas>
    
    <script>
        const canvas = document.getElementById("gameBoard");
        const ctx = canvas.getContext("2d");
        let x = 10;

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear previous frame
            ctx.fillStyle = "red";
            ctx.fillRect(x, 120, 30, 30); // Draw player
            x += ; // Move player
            requestAnimationFrame(update); // Call next frame
        }
        update();
    </script>
</body>
</html>
