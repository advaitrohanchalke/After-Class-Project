<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Website Structure</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER & NAVIGATION */
        header {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        nav {
            background: #444;
            padding: 0.5rem;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* CONTENT */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 800px;
            margin: auto;
            line-height: 1.6;
        }

        /* FOOTER */
        footer {
            background: #222;
            color: #ccc;
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
</button>
<body>

    <!-- THE HEADER -->
    <header>
        <h1>Utpatang Store</h1>
    </header>

    <!-- THE NAVIGATION BAR -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Groceries</a>
        <a href="#">Accessories</a>
        <a href="#">Necessities</a>
    </nav>
<img src="https:\google\downloads\images__10_-removebg-preview.png">
    <!-- THE MAIN CONTENT -->
    <main>
        <h2>Welcome to the Utpatang Store</h2>
        <p>Here you can search for groceries, accessories, and more...</p>
        <!-- BUTTON TAG -->
        <button type="button" class="custom-btn" onclick="alert('Items added to cart')document.getElementById('text').innerHTML = 'Changed!';">
            Add to cart
        </button>
    </main>

    <!-- THE FOOTER -->
    <footer>
        <p>Utpatang Store Privacy Cookies</p>
    </footer>

</body>

</html>
