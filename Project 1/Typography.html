<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography</title>
    <style>
        .body1{
            font-family:'Segoe UI';
        }
        .h_2{
            font-family:sans-serif;
            color:blue;
        }
        .h_3{
            font-family:serif;
            color:red;
        }
        .h_4{
            font-family:cursive;
            color:green;
        }
        .h_5{
            text-decoration:line-through;
            text-transform:uppercase;
        }
        .h_6{
            text-decoration:underline;
            text-transform:lowercase;
        }
        .h_7{
            text-decoration:overline;
        }
    
    </style>
</head>
<body align="center" class="body1">
    <h1>Typography</h1>
    <h2 class="h_2">Sans-serif is the font-family.</h2>
    <h2 class="h_3">Serif is the font-family.</h2>
    <h2 class="h_4">Cursive is the font-family.</h2>
    <h3 class="h_5">₹1599</h3>
    <h3 class="h_6">₹1599</h3>
    <h3 class="h_7">₹1599</h3>
</body>
</html>
