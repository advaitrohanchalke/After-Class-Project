<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
<!-- Trigger Button -->
<button id="openModal">Show Message</button>

<!-- Modal Structure -->
<dialog id="errorModal">
    <div class="modal-content">
        <div class="icon">LOL</div> 
        <h2>Ooops!</h2>
        <p>No Internet connection found.<br>Check your connection.</p>
        <button id="closeModal" class="retry-btn">Try Again</button>
    </div>
</dialog>
    
</body>
</html>
